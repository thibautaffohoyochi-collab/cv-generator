<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — CV Generator Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #0071e3; --text: #1d1d1f; --text3: #6e6e73;
      --bg: #ffffff; --bg2: #f5f5f7;
      --font: -apple-system,'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; text-align: center;
      padding: 40px 24px; -webkit-font-smoothing: antialiased;
    }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 56px; }
    .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--blue); display: grid; place-items: center; font-size: 15px; color: #fff; }
    .logo-name { font-size: 16px; font-weight: 600; color: var(--text); }

    .code {
      font-size: clamp(6rem, 20vw, 10rem); font-weight: 800;
      letter-spacing: -0.06em; line-height: 1;
      background: linear-gradient(135deg, #0071e3, #5ac8fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 24px;
    }
    h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; letter-spacing: -0.03em; margin-bottom: 14px; }
    p { font-size: 16px; color: var(--text3); max-width: 420px; line-height: 1.65; margin-bottom: 40px; }

    .btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn-fill {
      padding: 13px 28px; border-radius: 980px; font-size: 15px;
      font-weight: 500; background: var(--blue); color: #fff;
      text-decoration: none; transition: background .15s; font-family: var(--font);
    }
    .btn-fill:hover { background: #0077ed; }
    .btn-ghost {
      padding: 13px 28px; border-radius: 980px; font-size: 15px;
      font-weight: 500; background: var(--bg2); color: var(--blue);
      text-decoration: none; border: 0.5px solid rgba(0,0,0,0.1);
      transition: background .15s; font-family: var(--font);
    }
    .btn-ghost:hover { background: #ebebed; }

    .hint {
      margin-top: 52px; font-size: 13px; color: var(--text3);
      display: flex; align-items: center; gap: 6px;
    }
    .hint i { color: var(--blue); }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon"><i class="fas fa-file-alt"></i></div>
    <div class="logo-name">CV Generator Pro</div>
  </div>

  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>Cette page n'existe pas ou a été déplacée. Revenez à l'accueil pour créer votre CV professionnel.</p>

  <div class="btns">
    <a href="/cv-generator/" class="btn-fill"><i class="fas fa-home" style="margin-right:7px"></i>Retour à l'accueil</a>
    <a href="/cv-generator/app.html" class="btn-ghost"><i class="fas fa-rocket" style="margin-right:7px"></i>Créer mon CV</a>
  </div>

  <div class="hint">
    <i class="fas fa-circle" style="font-size:7px;color:#34c759"></i>
    100% Gratuit · Sans inscription · Données locales
  </div>
</body>
</html>
