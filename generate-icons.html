<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Générer les icônes PWA</title></head>
<body style="font-family:sans-serif;padding:20px;background:#f5f5f7">
<h2>Générateur d'icônes PWA — CV Generator Pro</h2>
<p>Cliquez sur "Générer & Télécharger" pour créer toutes les icônes nécessaires.</p>
<button onclick="generateAll()" style="background:#0071e3;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer">
  ⬇️ Générer & Télécharger toutes les icônes
</button>
<div id="preview" style="display:flex;flex-wrap:wrap;gap:16px;margin-top:24px"></div>

<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];

function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#0071e3');
  grad.addColorStop(1, '#5e17eb');

  // Rounded rect
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size-r);
  ctx.quadraticCurveTo(size, size, size-r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size-r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Document
  const s = size / 512;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(ctx, 136*s, 96*s, 240*s, 300*s, 16*s);

  // Lines
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillRect(168*s, 148*s, 80*s, 10*s);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillRect(168*s, 170*s, 120*s, 8*s);

  const lines = [[176,7],[144,7],[160,7],[176,7],[120,7],[144,7]];
  const yStart = 210;
  lines.forEach(([w, h], i) => {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(168*s, (yStart + i*18)*s, w*s, h*s);
  });

  // Pro badge
  ctx.beginPath();
  ctx.arc(340*s, 380*s, 52*s, 0, Math.PI*2);
  ctx.fillStyle = '#0071e3';
  ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 6*s;
  ctx.stroke();

  ctx.fillStyle = 'white';
  ctx.font = `bold ${36*s}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Pro', 340*s, 382*s);

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  ctx.fill();
}

function generateAll() {
  const preview = document.getElementById('preview');
  preview.innerHTML = '';

  sizes.forEach(size => {
    const canvas = drawIcon(size);

    // Preview
    const wrapper = document.createElement('div');
    wrapper.style.textAlign = 'center';
    const c2 = drawIcon(Math.min(size, 96));
    wrapper.appendChild(c2);
    const label = document.createElement('div');
    label.style.fontSize = '12px';
    label.textContent = size + 'x' + size;
    wrapper.appendChild(label);
    preview.appendChild(wrapper);

    // Download
    const a = document.createElement('a');
    a.download = 'icon-' + size + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });

  document.querySelector('button').textContent = '✅ Icônes générées ! Placez-les dans le dossier icons/';
}
</script>
</body>
</html>
